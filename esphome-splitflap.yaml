esphome:
  name: esphome-splitflap1
  friendly_name: ESPHome Split Flap 1

esp32:
  variant: ESP32C3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FREERTOS_HZ: "1000"

# Enable logging
logger:
  baud_rate: 115200 # Disable logging with baud_rate: 0. This may improve performance/accuracy

# Enable Home Assistant API
api:
  encryption:
    key: !secret home_assistant_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  power_save_mode: none
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "esphome-splitflap"
    # password: !secret iot_captive_password

captive_portal:

external_components:
  # - source:
  #     type: git
  #     url: https://github.com/chen-ye/esphome-split-flap
  #     ref: main
  #   components: [ split_flap ]
  - source:
      type: local
      path: components
    components: [ split_flap ]

i2c:
  sda: GPIO8
  scl: GPIO9
  frequency: 400khz


button:
  - platform: template
    name: "Home Split Flap"
    on_press:
      - split_flap.home:
          id: split_flap_display

  - platform: template
    name: "Step Character Test"
    on_press:
      - split_flap.step_9_test:
          id: split_flap_display

number:
  # =========================================================================
  # Calibration Offset Polarity Cheatsheet:
  # - Positive Offset (+N): Software thinks physical drum is ahead -> takes FEWER steps.
  #   Flap stops physically HIGHER / EARLIER (counter-clockwise) in window.
  # - Negative Offset (-N): Software thinks physical drum is behind -> takes MORE steps.
  #   Flap stops physically LOWER / LATER (clockwise) in window.
  #
  # Tuning Rules:
  # - Flap too low (needs to go UP/earlier): Increase offset (make it more positive).
  # - Flap too high (needs to go DOWN/later): Decrease offset (make it more negative).
  # =========================================================================
  - platform: template
    id: offset_0
    name: "Module 0 Offset"
    min_value: -100
    max_value: 100
    step: 1
    initial_value: 0
    optimistic: true
    restore_value: true

  - platform: template
    id: offset_1
    name: "Module 1 Offset"
    min_value: -100
    max_value: 100
    step: 1
    initial_value: 0
    optimistic: true
    restore_value: true

  - platform: template
    id: offset_2
    name: "Module 2 Offset"
    min_value: -100
    max_value: 100
    step: 1
    initial_value: 0
    optimistic: true
    restore_value: true

  - platform: template
    id: offset_3
    name: "Module 3 Offset"
    min_value: -100
    max_value: 100
    step: 1
    initial_value: -24
    optimistic: true
    restore_value: true

  - platform: template
    id: offset_4
    name: "Module 4 Offset"
    min_value: -100
    max_value: 100
    step: 1
    initial_value: 0
    optimistic: true
    restore_value: true

  - platform: template
    id: offset_5
    name: "Module 5 Offset"
    min_value: -100
    max_value: 100
    step: 1
    initial_value: 34
    optimistic: true
    restore_value: true

  - platform: template
    id: offset_6
    name: "Module 6 Offset"
    min_value: -100
    max_value: 100
    step: 1
    initial_value: 0
    optimistic: true
    restore_value: true

  - platform: template
    id: offset_7
    name: "Module 7 Offset"
    min_value: -100
    max_value: 100
    step: 1
    initial_value: -15
    optimistic: true
    restore_value: true

text:
  - platform: split_flap
    name: "Display Text"
    id: split_flap_display
    mode: TEXT
    steps_per_rot: 2048
    magnet_position: 615
    display_offset: 0
    max_vel: 15.0
    home_on_startup: true
    startup_string: |
      HELLO
      ALEX


    modules:
      - address: 0x20
        offset: offset_0
      - address: 0x21
        offset: offset_1
      - address: 0x22
        offset: offset_2
      - address: 0x23
        offset: offset_3
      - address: 0x24
        offset: offset_4
      - address: 0x25
        offset: offset_5
      - address: 0x26
        offset: offset_6
      - address: 0x27
        offset: offset_7
